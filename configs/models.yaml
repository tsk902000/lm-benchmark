# Model registry for lmbench.
#
# Resolved by `lmbench.config.loader.load_models`. Each entry maps to
# `lmbench.config.schema.ModelEntry`.
#
# Notes:
# - `hf_id` is the HuggingFace repo id used by `vllm serve`.
# - `gated: true` means HF gating requires `HF_TOKEN` in the env.
# - `vllm.tensor_parallel_size` may be inherited from a hardware profile via
#   `apply_hardware_defaults` if left at 1.

models:
  - name: opt-125m-smoke
    hf_id: facebook/opt-125m
    notes: "Tiny model for CI smoke runs. CPU-loadable; no gating."
    expected_max_model_len: 2048
    vllm:
      tensor_parallel_size: 1
      max_model_len: 2048
      dtype: auto
      gpu_memory_utilization: 0.5
      enforce_eager: true

  - name: mimo-v2.5
    hf_id: XiaomiMiMo/MiMo-V2.5
    gated: false
    notes: >
      Public FP8 sparse MoE checkpoint (310B / 15B active). Use the dedicated
      run plan in configs/run_mimo_v2_5_nvfp4.yaml for benchmark defaults.
    expected_max_model_len: 1048576
    vllm:
      tensor_parallel_size: 2
      max_model_len: 32768
      dtype: auto
      gpu_memory_utilization: 0.9
      kv_cache_dtype: fp8
      trust_remote_code: true
      enable_prefix_caching: false
      extra_args:
        generation-config: vllm
        max-num-batched-tokens: "32768"
