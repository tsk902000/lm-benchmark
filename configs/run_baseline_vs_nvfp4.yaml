# Full baseline-vs-NVFP4 run plan targeting XiaomiMiMo/MiMo-V2.5.
#
# IMPORTANT - derisking strategy:
#
# MiMo-V2.5 is a 310B/15B-active sparse-MoE multimodal model with a custom
# attention block (hybrid SWA + GA + attention sinks) and ViT/audio
# encoders. NVIDIA has not (as of writing) published an NVFP4 release for
# it, and modelopt's NVFP4_DEFAULT_CFG pattern-matches against known module
# shapes - so V2.5 may not auto-quantize without a custom quant_cfg.
#
# This plan therefore runs in two stages:
#
#   1. mimo-v2-flash  - smaller text-only ancestor of V2.5's LLM trunk.
#                       If this NVFP4's cleanly, we have evidence the
#                       trunk pattern is recognized by modelopt.
#   2. mimo-v2.5      - the real target. Expect surprises (multimodal
#                       encoders staying bf16, custom-block rejection,
#                       or vLLM not loading the modelopt_fp4 form).
#
# To run only the derisk stage, comment out the v2.5 entry in `models:`
# below. The schema rejects NVFP4 on non-Blackwell hardware, so if you
# do not have a B300 / B100 / B200 host, switch the `hardware:` profile
# and either drop `quant_recipe` or change its method.

name: baseline-vs-nvfp4
output_dir: results/baseline-vs-nvfp4

models:
  # Derisk first: smaller text trunk.
  - name: mimo-v2-flash
    hf_id: XiaomiMiMo/MiMo-V2-Flash
    gated: false
    notes: >
      Text-only ancestor of V2.5's LLM trunk; same hybrid-attention block
      family. Use this to verify modelopt NVFP4 pattern-matches the MiMo
      transformer block before betting on the 310B variant.
    expected_max_model_len: 262144
    vllm:
      tensor_parallel_size: 2
      max_model_len: 32768
      dtype: bfloat16
      gpu_memory_utilization: 0.9
      trust_remote_code: true
      enable_prefix_caching: true

  # Real target: full multimodal 310B/15B-active MoE.
  # WARNING: bf16 baseline ~620 GB; TP=2 on B300 (576 GB) is borderline
  # tight, so this entry uses TP=4. If you only have a 2-GPU host, drop
  # this entry and run the derisk stage first. NVFP4 inference fits TP=2.
  - name: mimo-v2.5
    hf_id: XiaomiMiMo/MiMo-V2.5
    gated: false
    notes: >
      Sparse MoE (310B / 15B active), hybrid SWA+GA attention with sinks,
      multimodal (text + ViT + audio). Calibration here is text-only via
      cnn_dailymail; the multimodal encoders may stay bf16 even after
      quantize. Verify carefully.
    expected_max_model_len: 262144
    vllm:
      tensor_parallel_size: 4
      max_model_len: 32768
      dtype: bfloat16
      gpu_memory_utilization: 0.9
      trust_remote_code: true
      enable_prefix_caching: true

workloads:
  # Standard sweep at moderate context to stay within max_model_len above.
  - name: random-short
    kind: random
    num_prompts: 500
    concurrency: [1, 8, 32]
    input_len: 1024
    output_len: 256
    seed: 0
    warmup_prompts: 16

  # Long-context perf: stress the hybrid SWA + KV-cache discount.
  - name: random-long
    kind: longctx
    num_prompts: 100
    concurrency: [1, 4]
    input_len: 16384
    output_len: 1024
    seed: 0
    warmup_prompts: 8

eval_suite:
  name: baseline-vs-nvfp4-suite
  # Standard knowledge / reasoning floor.
  tasks:
    - mmlu
    - gsm8k
    - arc_challenge
    - hellaswag
    - truthfulqa_mc2
  num_fewshot:
    mmlu: 5
    gsm8k: 5
    arc_challenge: 25
    hellaswag: 10
    truthfulqa_mc2: 0
  # Long-context + coding tasks (RULER / LongBench / LiveCodeBench).
  # Run via the same lm_eval --model local-completions backend.
  long_context:
    - ruler
    - longbench
    - livecodebench
  include_humaneval: false

# NVFP4 PTQ via nvidia-modelopt with cnn_dailymail x 512 calibration.
quant_recipe:
  name: nvfp4-default
  method: nvfp4
  output_dir: results/quantized
  calibration:
    dataset: cnn_dailymail
    dataset_config: "3.0.0"
    split: train
    num_samples: 512
    max_seq_len: 2048
    seed: 0

hardware:
  name: b300-tp4
  gpu: B300
  blackwell: true
  num_gpus: 4         # bump to 4; the V2.5 entry uses TP=4 at baseline
  default_tp_size: 2
  max_concurrency: 128
