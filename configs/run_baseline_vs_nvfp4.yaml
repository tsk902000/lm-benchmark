# Baseline-vs-NVFP4 plan for a 2x B300 host.
#
# Hardware budget: 2 x B300 = 576 GB HBM.
#   - MiMo-V2-Flash (smaller text trunk): bf16 fits TP=2; NVFP4 fits TP=2.
#   - MiMo-V2.5 (310B/15B-active, multimodal): bf16 ~620 GB - DOES NOT
#     FIT on 2 GPUs. NVFP4 (~155 GB) does. With only 2 B300s we cannot
#     produce a baseline-vs-quantized comparison for V2.5 here. The V2.5
#     entry is therefore COMMENTED OUT with a clear note; uncomment it
#     once you have 4+ B300s (or a borrowed 8x H200 host for baseline).
#
# Architectural risk for MiMo-V2.5 NVFP4:
#   - Custom hybrid SWA+GA attention with sinks - modelopt may not
#     pattern-match the block without a custom quant_cfg.
#   - Multimodal ViT + audio encoders - calibration here is text-only
#     via cnn_dailymail; the encoders may stay bf16 even after quantize.
#   - vLLM must support both the bf16 and modelopt_fp4 forms; custom
#     remote_code may or may not load.
#
# Derisking strategy:
#   1. Run V2-Flash through the full pipeline on 2x B300. If NVFP4
#      quantizes and verifies cleanly, we have evidence the MiMo
#      transformer block family is supported.
#   2. Then attempt V2.5 - either by securing a larger host for baseline,
#      or by running NVFP4 inference standalone (would need a new
#      `--skip-baseline` runner mode; not yet implemented).
#
# To run: `uv run lmbench run --plan configs/run_baseline_vs_nvfp4.yaml`

name: baseline-vs-nvfp4
output_dir: results/baseline-vs-nvfp4

models:
  # Derisk first: smaller text trunk.
  - name: mimo-v2-flash
    hf_id: XiaomiMiMo/MiMo-V2-Flash
    gated: false
    notes: >
      Text-only ancestor of V2.5's LLM trunk; same hybrid-attention block
      family. Use this to verify modelopt NVFP4 pattern-matches the MiMo
      transformer block before betting on the 310B variant.
    expected_max_model_len: 262144
    vllm:
      tensor_parallel_size: 2
      max_model_len: 32768
      dtype: bfloat16
      gpu_memory_utilization: 0.9
      trust_remote_code: true
      enable_prefix_caching: true

  # ---------------------------------------------------------------
  # Real target: full multimodal 310B/15B-active MoE.
  # COMMENTED OUT for 2x B300 - bf16 ~620 GB does not fit 576 GB HBM.
  # Uncomment once you have 4+ B300s (or an 8x H200 / similar host
  # for the baseline phase). NVFP4 inference of V2.5 fits TP=2 and
  # could be measured standalone, but the runner currently requires
  # a baseline to produce a comparison report.
  # ---------------------------------------------------------------
  # - name: mimo-v2.5
  #   hf_id: XiaomiMiMo/MiMo-V2.5
  #   gated: false
  #   notes: >
  #     Sparse MoE (310B / 15B active), hybrid SWA+GA attention with
  #     sinks, multimodal (text + ViT + audio). Calibration here is
  #     text-only via cnn_dailymail; the multimodal encoders may stay
  #     bf16 even after quantize.
  #   expected_max_model_len: 262144
  #   vllm:
  #     tensor_parallel_size: 4    # baseline needs >=4 GPUs
  #     max_model_len: 32768
  #     dtype: bfloat16
  #     gpu_memory_utilization: 0.9
  #     trust_remote_code: true
  #     enable_prefix_caching: true

workloads:
  # Standard sweep at moderate context to stay within max_model_len above.
  - name: random-short
    kind: random
    num_prompts: 500
    concurrency: [1, 8, 32]
    input_len: 1024
    output_len: 256
    seed: 0
    warmup_prompts: 16

  # Long-context perf: stress the hybrid SWA + KV-cache discount.
  - name: random-long
    kind: longctx
    num_prompts: 100
    concurrency: [1, 4]
    input_len: 16384
    output_len: 1024
    seed: 0
    warmup_prompts: 8

eval_suite:
  name: baseline-vs-nvfp4-suite
  # Standard knowledge / reasoning floor.
  tasks:
    - mmlu
    - gsm8k
    - arc_challenge
    - hellaswag
    - truthfulqa_mc2
  num_fewshot:
    mmlu: 5
    gsm8k: 5
    arc_challenge: 25
    hellaswag: 10
    truthfulqa_mc2: 0
  # Long-context + coding tasks (RULER / LongBench / LiveCodeBench).
  # Run via the same lm_eval --model local-completions backend.
  long_context:
    - ruler
    - longbench
    - livecodebench
  include_humaneval: false

# NVFP4 PTQ via nvidia-modelopt with cnn_dailymail x 512 calibration.
quant_recipe:
  name: nvfp4-default
  method: nvfp4
  output_dir: results/quantized
  calibration:
    dataset: cnn_dailymail
    dataset_config: "3.0.0"
    split: train
    num_samples: 512
    max_seq_len: 2048
    seed: 0

hardware:
  name: b300-tp2
  gpu: B300
  blackwell: true
  num_gpus: 2
  default_tp_size: 2
  max_concurrency: 128
